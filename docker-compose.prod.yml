services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
      - '443:443/udp'
    volumes:
      - ./Caddyfile.prod:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      DOMAIN: ${DOMAIN}
    depends_on:
      - web
      - api

  web:
    image: ghcr.io/${GHCR_OWNER}/nookapp-web:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NUXT_HOST: 0.0.0.0
      NUXT_PORT: 4001
      NUXT_PUBLIC_API_BASE: https://${DOMAIN}/api/v1
      NUXT_PUBLIC_AUTH_BASE: https://${DOMAIN}/api/auth
      NUXT_PUBLIC_WEB_URL: https://${DOMAIN}
      NUXT_PUBLIC_LIVEKIT_URL: wss://${DOMAIN}/livekit
      NUXT_PUBLIC_COLLAB_URL: wss://${DOMAIN}/collab
      NUXT_PUBLIC_GIPHY_API_KEY: ${NUXT_PUBLIC_GIPHY_API_KEY:-}
    expose:
      - '4001'

  api:
    image: ghcr.io/${GHCR_OWNER}/nookapp-api:${IMAGE_TAG:-latest}
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      API_PORT: 4000
      COLLAB_PORT: 4234
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: https://${DOMAIN}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: https://${DOMAIN}/api/auth/callback/discord
      LIVEKIT_URL: wss://${DOMAIN}/livekit
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET}
      MAIL_DRIVER: resend
      MAIL_FROM: ${MAIL_FROM}
      RESEND_API_KEY: ${RESEND_API_KEY}
      NUXT_PUBLIC_WEB_URL: https://${DOMAIN}
    expose:
      - '4000'
      - '4234'
    volumes:
      - api-uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER}']
      interval: 10s
      timeout: 3s
      retries: 10

  livekit:
    image: livekit/livekit-server:latest
    restart: unless-stopped
    command:
      - --bind=0.0.0.0
      - --node-ip=${LIVEKIT_NODE_IP}
    environment:
      LIVEKIT_KEYS: '${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}'
      LIVEKIT_PORT: '7880'
      LIVEKIT_RTC_TCP_PORT: '7881'
      LIVEKIT_RTC_PORT_RANGE_START: '7882'
      LIVEKIT_RTC_PORT_RANGE_END: '7882'
      LIVEKIT_RTC_USE_EXTERNAL_IP: 'true'
    expose:
      - '7880'
    ports:
      - '7881:7881/tcp'
      - '7882:7882/udp'

volumes:
  postgres-data:
  caddy-data:
  caddy-config:
  api-uploads:
