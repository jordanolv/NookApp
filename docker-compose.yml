services:
  postgres:
    image: postgres:17-alpine
    container_name: nookapp-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: nookapp
      POSTGRES_PASSWORD: nookapp
      POSTGRES_DB: nookapp
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U nookapp']
      interval: 5s
      timeout: 3s
      retries: 10

  mailpit:
    image: axllent/mailpit:latest
    container_name: nookapp-mailpit
    restart: unless-stopped
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    environment:
      MP_MAX_MESSAGES: 5000
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  livekit:
    image: livekit/livekit-server:latest
    container_name: nookapp-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    ports:
      - '7880:7880' # WebSocket signaling
      - '7881:7881' # TCP ICE/TURN
      - '7882:7882/udp' # UDP media (matches livekit.yaml)
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml:ro

volumes:
  postgres-data:
